<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify – Sign In</title>
    <meta name="description" content="Sign in to Taskify to manage your tasks with Google or Email.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-main: #0a0a0b;
            --bg-card: #151516;
            --bg-input: #111112;
            --bg-hover: #1e1e1f;
            --text-primary: #ffffff;
            --text-secondary: #8c8c91;
            --text-muted: #525256;
            --brand-primary: #f97316;
            --brand-primary-hover: #ea580c;
            --brand-secondary: #43210b;
            --border-color: #27272a;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-full: 9999px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            /* Animated gradient background */
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249, 115, 22, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(249, 115, 22, 0.06) 0%, transparent 60%);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Logo */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .logo-icon {
            background-color: var(--brand-primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
        }

        .auth-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* Card */
        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background-color: var(--bg-input);
            border-radius: var(--radius-full);
            padding: 4px;
            margin-bottom: 1.75rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-family: var(--font-family);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-tab.active {
            background-color: var(--brand-primary);
            color: white;
        }

        /* Form title */
        .auth-title {
            margin-bottom: 1.5rem;
        }

        .auth-title h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.25rem;
        }

        .auth-title p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Form fields */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-family);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: var(--brand-primary-hover);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .btn-google {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-family: var(--font-family);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: var(--transition);
        }

        .btn-google:hover {
            background-color: var(--bg-hover);
            border-color: #3f3f46;
            transform: translateY(-1px);
        }

        .btn-google:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Google "G" icon */
        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* Error / Success messages */
        .auth-message {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .auth-message.error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .auth-message.success {
            background-color: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .auth-message.show {
            display: block;
        }

        /* Loading spinner in button */
        .btn-submit .spinner,
        .btn-google .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn-submit.loading .spinner {
            display: inline-block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .btn-google.loading .spinner {
            display: inline-block;
        }

        .btn-google.loading .google-icon {
            display: none;
        }

        .btn-google.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon"><i class='bx bx-check-square'></i></div>
            <h1>Taskify</h1>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Dynamic title -->
            <div class="auth-title">
                <h2 id="form-title">Welcome back</h2>
                <p id="form-subtitle">Sign in to access your tasks</p>
            </div>

            <!-- Error / success feedback -->
            <div class="auth-message error" id="auth-error"></div>
            <div class="auth-message success" id="auth-success"></div>

            <!-- Email/Password Form -->
            <form id="auth-form" onsubmit="handleEmailAuth(event)" novalidate>
                <div class="form-group">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••" required
                        autocomplete="current-password" minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="btn-submit" aria-label="Submit auth form">
                    <span class="spinner"></span>
                    <span class="btn-text" id="btn-submit-text">Sign In</span>
                </button>
            </form>

            <div class="divider">or</div>

            <!-- Google Sign-In -->
            <button class="btn-google" id="btn-google" onclick="handleGoogleAuth()" aria-label="Continue with Google">
                <span class="spinner"></span>
                <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFC107"
                        d="M43.6 20.1H42V20H24v8h11.3C33.6 33 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z" />
                    <path fill="#FF3D00"
                        d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" />
                    <path fill="#4CAF50"
                        d="M24 44c5.2 0 9.9-1.9 13.5-5L31.8 33c-2.1 1.5-4.7 2.4-7.8 2.4-5.3 0-9.7-3.5-11.3-8.4l-6.6 5C9.7 39.5 16.3 44 24 44z" />
                    <path fill="#1976D2"
                        d="M43.6 20.1H42V20H24v8h11.3c-.9 2.5-2.5 4.6-4.5 6l.1.1 5.7 5c-.4.3 6.3-4.6 6.3-15.1 0-1.3-.1-2.7-.4-3.9z" />
                </svg>
                <span class="btn-text">Continue with Google</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { auth, googleProvider } from './firebase.js';
        import {
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signInWithPopup,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        // If already signed in, redirect to main app
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        let currentTab = 'login';

        window.switchTab = function (tab) {
            currentTab = tab;
            const loginTab = document.getElementById('tab-login');
            const signupTab = document.getElementById('tab-signup');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const btnText = document.getElementById('btn-submit-text');
            const pwInput = document.getElementById('auth-password');

            clearMessages();

            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                title.textContent = 'Welcome back';
                subtitle.textContent = 'Sign in to access your tasks';
                btnText.textContent = 'Sign In';
                pwInput.autocomplete = 'current-password';
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                title.textContent = 'Create account';
                subtitle.textContent = 'Start organizing your tasks today';
                btnText.textContent = 'Create Account';
                pwInput.autocomplete = 'new-password';
            }
        };

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('auth-success').classList.remove('show');
        }

        function showSuccess(msg) {
            const el = document.getElementById('auth-success');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('auth-error').classList.remove('show');
        }

        function clearMessages() {
            document.getElementById('auth-error').classList.remove('show');
            document.getElementById('auth-success').classList.remove('show');
        }

        function friendlyError(code) {
            const map = {
                'auth/user-not-found': 'No account found with that email.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/email-already-in-use': 'An account with this email already exists.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/too-many-requests': 'Too many attempts. Please try again later.',
                'auth/popup-closed-by-user': 'Sign-in popup was closed.',
                'auth/invalid-credential': 'Invalid email or password.',
            };
            return map[code] || 'Something went wrong. Please try again.';
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) btn.classList.add('loading');
            else btn.classList.remove('loading');
            btn.disabled = loading;
        }

        window.handleEmailAuth = async function (e) {
            e.preventDefault();
            clearMessages();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!email || !password) return showError('Please fill in all fields.');

            setLoading('btn-submit', true);
            setLoading('btn-google', true);

            try {
                if (currentTab === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    showSuccess('Account created! Redirecting...');
                }
                // onAuthStateChanged will handle redirect
            } catch (err) {
                showError(friendlyError(err.code));
                setLoading('btn-submit', false);
                setLoading('btn-google', false);
            }
        };

        window.handleGoogleAuth = async function () {
            clearMessages();
            setLoading('btn-google', true);
            setLoading('btn-submit', true);

            try {
                await signInWithPopup(auth, googleProvider);
                // onAuthStateChanged will handle redirect
            } catch (err) {
                showError(friendlyError(err.code));
                setLoading('btn-google', false);
                setLoading('btn-submit', false);
            }
        };
    </script>
</body>

</html>
